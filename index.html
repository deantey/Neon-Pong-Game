<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Neon Arcade Pong</title>
<style>
html,body{margin:0;height:100%;overflow:hidden;background:#050510;font-family:Arial}
canvas{display:block;width:100vw;height:100vh}
#msg{position:absolute;top:15px;width:100%;text-align:center;color:#7efcff;
text-shadow:0 0 10px #0ff;font-size:20px}
</style>
</head>
<body>
<div id="msg">🏓 Neon Arcade Pong — Drag on the left side (touch) or W/S. First to 10 wins.</div>
<canvas id="game"></canvas>
<script>
const c=document.getElementById("game"),ctx=c.getContext("2d");
function resize(){c.width=innerWidth;c.height=innerHeight}
resize();addEventListener("resize",resize);

let p={x:30,y:200,w:18,h:120}, ai={x:0,y:200,w:18,h:120},
b={x:300,y:200,r:10,vx:7,vy:4},L=0,R=0,over=false;
const keys={};
onkeydown=e=>keys[e.key.toLowerCase()]=true;
onkeyup=e=>keys[e.key.toLowerCase()]=false;
c.addEventListener("touchmove",e=>{
 const t=e.touches[0];
 if(t.clientX<c.width/2)p.y=t.clientY-p.h/2;
 e.preventDefault();
},{passive:false});

function beep(f){
 const ac=new (window.AudioContext||window.webkitAudioContext)();
 const o=ac.createOscillator(),g=ac.createGain();
 o.frequency.value=f;o.connect(g);g.connect(ac.destination);
 g.gain.value=.03;o.start();o.stop(ac.currentTime+.05);
}

function reset(dir){
 b.x=c.width/2;b.y=c.height/2;
 b.vx=7*dir;b.vy=(Math.random()*6)-3;
}

function glow(color){
 ctx.shadowBlur=20;ctx.shadowColor=color;ctx.fillStyle=color;
}
function draw(){
 requestAnimationFrame(draw);
 if(keys["w"])p.y-=8;if(keys["s"])p.y+=8;
 p.y=Math.max(0,Math.min(c.height-p.h,p.y));
 ai.x=c.width-50;
 ai.y+=(b.y-ai.y-ai.h/2)*0.08;

 if(!over){
  b.x+=b.vx;b.y+=b.vy;
  if(b.y<b.r||b.y>c.height-b.r){b.vy*=-1;beep(700);}
  if(b.x-b.r<p.x+p.w&&b.y>p.y&&b.y<p.y+p.h&&b.vx<0){b.vx*=-1.05;beep(500);}
  if(b.x+b.r>ai.x&&b.y>ai.y&&b.y<ai.y+ai.h&&b.vx>0){b.vx*=-1.05;beep(500);}
  if(b.x<0){R++;beep(250);reset(1);}
  if(b.x>c.width){L++;beep(250);reset(-1);}
  if(L>=10||R>=10)over=true;
 }

 ctx.fillStyle="#050510";ctx.fillRect(0,0,c.width,c.height);
 ctx.strokeStyle="#0ff";ctx.setLineDash([12,12]);
 ctx.beginPath();ctx.moveTo(c.width/2,0);ctx.lineTo(c.width/2,c.height);ctx.stroke();
 ctx.setLineDash([]);

 glow("#00ffff");ctx.fillRect(p.x,p.y,p.w,p.h);
 glow("#ff00ff");ctx.fillRect(ai.x,ai.y,ai.w,ai.h);
 glow("#ffffff");
 ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill();

 ctx.shadowBlur=0;
 ctx.fillStyle="#7efcff";
 ctx.font="bold 48px Arial";
 ctx.fillText(L,c.width/2-80,60);
 ctx.fillText(R,c.width/2+50,60);

 if(over){
  ctx.fillStyle="#fff";
  ctx.font="bold 56px Arial";
  ctx.fillText((L>R?"YOU WIN!":"AI WINS!"),c.width/2-170,c.height/2);
  ctx.font="28px Arial";
  ctx.fillText("Refresh the page to play again",c.width/2-170,c.height/2+50);
 }
}
reset(1);draw();
</script>
</body>
</html>
